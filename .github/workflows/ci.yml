name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  console-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/console
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/console/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build

  quality:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      NORTHGATE_TEST_REDIS_URL: redis://127.0.0.1:6379/15
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest -m "not integration" -q
      - run: docker compose config --quiet

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: northgate
          POSTGRES_USER: northgate
          POSTGRES_PASSWORD: northgate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U northgate -d northgate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      NORTHGATE_DATABASE_URL: postgresql+asyncpg://northgate:northgate@127.0.0.1:5432/northgate
      NORTHGATE_TEST_DATABASE_URL: postgresql+asyncpg://northgate:northgate@127.0.0.1:5432/northgate
      NORTHGATE_TEST_REDIS_URL: redis://127.0.0.1:6379/15
      NORTHGATE_REQUIRE_INTEGRATION_STORES: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run alembic upgrade head
      - run: uv run pytest -m integration -q
